<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muninn — DFIR Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0e1a;
      --bg-panel: rgba(16, 22, 40, 0.55);
      --bg-card: rgba(22, 30, 56, 0.45);
      --bg-solid: #101628;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(255, 255, 255, 0.15);
      --glass-border-hover: rgba(255, 255, 255, 0.22);
      --text-primary: #e8ecf4;
      --text-secondary: rgba(232, 236, 244, 0.55);
      --text-muted: rgba(232, 236, 244, 0.35);
      --accent-cyan: #00d4ff;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-pink: #f472b6;
      --accent-green: #22c55e;
      --accent-orange: #f59e0b;
      --accent-red: #ef4444;
      --sidebar-width: 74px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: var(--font-main);
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    ::selection { background: rgba(0, 212, 255, 0.25); color: #fff; }

    /* ===== BACKGROUND ===== */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 18% 25%, rgba(59, 130, 246, 0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 72%, rgba(139, 92, 246, 0.11) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0, 212, 255, 0.06) 0%, transparent 60%),
        var(--bg-deep);
    }
    .bg-mesh::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.4;
    }
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      opacity: 0; animation: float-particle 9s ease-in-out infinite;
    }
    @keyframes float-particle {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.55; transform: translateY(-20px) scale(1); }
      80% { opacity: 0.25; transform: translateY(-90px) scale(0.5); }
    }

    /* ===== LAYOUT ===== */
    .app-container { position: relative; z-index: 1; display: flex; height: 100vh; }
    .main-content {
      flex: 1; display: flex; flex-direction: column;
      padding: 18px 22px 18px 22px;
      padding-right: calc(var(--sidebar-width) + 22px);
      min-width: 0; height: 100vh; overflow: hidden;
    }
    .view-area {
      flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; gap: 16px;
      padding-top: 16px; padding-right: 4px;
    }

    /* ===== GLASS ===== */
    .glass {
      background: var(--bg-panel);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: border-color .3s, box-shadow .3s, transform .3s;
    }
    .glass-card.hoverable:hover {
      border-color: var(--glass-border-hover);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 20px rgba(59,130,246,0.08), inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px; flex-shrink: 0;
      animation: fadeSlideDown .6s ease-out;
    }
    @keyframes fadeSlideDown { from { opacity:0; transform: translateY(-16px);} to {opacity:1; transform:translateY(0);} }
    .brand { display: flex; align-items: center; gap: 13px; }
    .brand-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
      animation: glow-pulse 3s ease-in-out infinite;
    }
    .brand-icon svg { width: 24px; height: 24px; color: #fff; }
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
      50% { box-shadow: 0 4px 30px rgba(0,212,255,0.5); }
    }
    .brand-text h1 {
      font-size: 21px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand-text .sub { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2.4px; font-weight: 500; }
    .header-actions { display: flex; align-items: center; gap: 10px; }

    /* ===== BUTTONS ===== */
    .btn-glass {
      background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
      color: var(--text-secondary); padding: 8px 15px; border-radius: var(--radius-sm);
      font-size: 12.5px; font-weight: 500; font-family: var(--font-main); cursor: pointer;
      backdrop-filter: blur(12px); transition: background .25s, border-color .25s, color .25s, transform .25s;
      display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .btn-glass:hover { background: rgba(255,255,255,0.1); border-color: var(--glass-border-light); color: var(--text-primary); transform: translateY(-1px); }
    .btn-glass:active { transform: translateY(0); }
    .btn-glass svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none; color: #fff; padding: 8px 17px; border-radius: var(--radius-sm);
      font-size: 12.5px; font-weight: 600; font-family: var(--font-main); cursor: pointer;
      box-shadow: 0 4px 16px rgba(59,130,246,0.35); transition: transform .25s, box-shadow .25s;
      display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary svg { width: 15px; height: 15px; flex-shrink: 0; }
    button:focus-visible, .sidebar-item:focus-visible, .nav-input:focus-visible, input:focus-visible, select:focus-visible {
      outline: 2px solid var(--accent-cyan); outline-offset: 2px;
    }

    /* ===== PAGE TITLE ===== */
    .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-shrink: 0; animation: fadeSlideUp .5s ease-out; }
    .page-head .pt-left { min-width: 0; }
    .page-head h2 { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
    .page-head h2 svg { width: 20px; height: 20px; color: var(--accent-cyan); }
    .page-head p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    @keyframes fadeSlideUp { from { opacity:0; transform: translateY(18px);} to {opacity:1; transform:translateY(0);} }

    /* ===== STATS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; flex-shrink: 0; }
    .stat-card { padding: 17px; display: flex; flex-direction: column; gap: 7px; }
    .stat-header { display: flex; align-items: center; justify-content: space-between; }
    .stat-label { font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }
    .stat-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .stat-icon svg { width: 18px; height: 18px; }
    .stat-icon.cyan { background: rgba(0,212,255,0.12); color: var(--accent-cyan); }
    .stat-icon.purple { background: rgba(139,92,246,0.12); color: var(--accent-purple); }
    .stat-icon.green { background: rgba(34,197,94,0.12); color: var(--accent-green); }
    .stat-icon.orange { background: rgba(245,158,11,0.12); color: var(--accent-orange); }
    .stat-icon.red { background: rgba(239,68,68,0.12); color: var(--accent-red); }
    .stat-value { font-size: 25px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
    .stat-change { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    .stat-change.positive { color: var(--accent-green); }
    .stat-change.negative { color: var(--accent-red); }
    .stat-change.neutral { color: var(--text-muted); }

    /* ===== CONTENT GRID ===== */
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .panel { padding: 17px; display: flex; flex-direction: column; gap: 12px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .card-title svg { width: 15px; height: 15px; color: var(--text-secondary); }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100% {opacity:1; transform:scale(1);} 50% {opacity:.5; transform:scale(.8);} }
    .card-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(0,212,255,0.1); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.2); font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
    .badge-blue { background: rgba(59,130,246,0.1)!important; color: var(--accent-blue)!important; border-color: rgba(59,130,246,0.2)!important; }
    .badge-purple { background: rgba(139,92,246,0.1)!important; color: var(--accent-purple)!important; border-color: rgba(139,92,246,0.2)!important; }
    .badge-green { background: rgba(34,197,94,0.1)!important; color: var(--accent-green)!important; border-color: rgba(34,197,94,0.2)!important; }
    .badge-orange { background: rgba(245,158,11,0.1)!important; color: var(--accent-orange)!important; border-color: rgba(245,158,11,0.2)!important; }
    .badge-red { background: rgba(239,68,68,0.1)!important; color: var(--accent-red)!important; border-color: rgba(239,68,68,0.2)!important; }

    /* ===== TIMELINE ===== */
    .timeline { display: flex; flex-direction: column; gap: 6px; }
    .timeline-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
      border-radius: var(--radius-sm); background: rgba(255,255,255,0.02);
      border: 1px solid transparent; transition: background .2s, border-color .2s; cursor: pointer;
    }
    .timeline-item:hover { background: rgba(0,212,255,0.05); border-color: rgba(0,212,255,0.15); }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; position: relative; }
    .timeline-dot.critical { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
    .timeline-dot.warning { background: var(--accent-orange); box-shadow: 0 0 8px var(--accent-orange); }
    .timeline-dot.info { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
    .timeline-dot.success { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
    .timeline-content { flex: 1; min-width: 0; }
    .timeline-title { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .timeline-desc { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); word-break: break-word; }
    .timeline-time { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; font-family: var(--font-mono); margin-top: 3px; text-align: right; }

    /* MITRE badges */
    .mitre { font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; padding: 1px 6px; border-radius: 5px; background: rgba(139,92,246,0.12); color: var(--accent-purple); border: 1px solid rgba(139,92,246,0.25); white-space: nowrap; }
    .sev-pill { font-size: 9.5px; font-weight: 700; padding: 1px 7px; border-radius: 5px; text-transform: uppercase; letter-spacing: .4px; }
    .sev-critical { background: rgba(239,68,68,0.14); color: var(--accent-red); }
    .sev-warning { background: rgba(245,158,11,0.14); color: var(--accent-orange); }
    .sev-info { background: rgba(59,130,246,0.14); color: var(--accent-blue); }
    .sev-success { background: rgba(34,197,94,0.14); color: var(--accent-green); }

    /* ===== CHART ===== */
    .chart-area { flex: 1; min-height: 150px; display: flex; align-items: flex-end; gap: 5px; padding: 18px 0 4px; position: relative; }
    .chart-bar { flex: 1; border-radius: 4px 4px 0 0; background: linear-gradient(to top, var(--accent-blue), var(--accent-cyan)); opacity: .7; transition: opacity .3s, filter .3s, transform .3s; position: relative; cursor: pointer; min-height: 8px; }
    .chart-bar:hover { opacity: 1; filter: brightness(1.3); transform: scaleY(1.04); transform-origin: bottom; }
    .chart-bar::after { content: attr(data-val); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--text-secondary); opacity: 0; transition: opacity .2s; font-family: var(--font-mono); white-space: nowrap; }
    .chart-bar:hover::after { opacity: 1; }
    .chart-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }

    /* Donut */
    .donut-wrap { display: flex; align-items: center; gap: 20px; padding: 6px 0; }
    .donut { --p: 0; width: 118px; height: 118px; border-radius: 50%; flex-shrink: 0; position: relative;
      background: conic-gradient(var(--accent-red) 0 var(--seg1), var(--accent-orange) var(--seg1) var(--seg2), var(--accent-blue) var(--seg2) var(--seg3), var(--accent-green) var(--seg3) 100%);
      mask: radial-gradient(farthest-side, transparent calc(100% - 20px), #000 calc(100% - 19px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 20px), #000 calc(100% - 19px)); }
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .legend-row { display: flex; align-items: center; gap: 9px; font-size: 12px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .legend-row .lg-label { color: var(--text-secondary); flex: 1; }
    .legend-row .lg-val { color: var(--text-primary); font-weight: 700; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }

    /* ===== TOOLBAR / FILTERS ===== */
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 8px 12px; flex: 1; min-width: 200px; transition: border-color .2s; }
    .search-box:focus-within { border-color: rgba(0,212,255,0.35); }
    .search-box svg { width: 15px; height: 15px; color: var(--text-muted); flex-shrink: 0; }
    .search-box input { background: none; border: none; outline: none; color: var(--text-primary); font-family: var(--font-main); font-size: 13px; width: 100%; }
    .search-box input::placeholder { color: var(--text-muted); }
    .chip { font-size: 11.5px; font-weight: 500; padding: 6px 13px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); color: var(--text-secondary); cursor: pointer; transition: all .2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
    .chip:hover { border-color: var(--glass-border-light); color: var(--text-primary); }
    .chip.active { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.3); color: var(--accent-cyan); }
    .chip .cnt { font-family: var(--font-mono); font-size: 10px; opacity: .7; }
    select.nav-input { background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-primary); padding: 8px 12px; font-family: var(--font-main); font-size: 12.5px; cursor: pointer; }

    /* ===== TABLE ===== */
    .table-wrap { overflow: auto; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: rgba(0,0,0,0.18); }
    table.dfir { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.dfir thead th {
      position: sticky; top: 0; z-index: 2; background: rgba(16,22,40,0.95); backdrop-filter: blur(8px);
      text-align: left; padding: 10px 14px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); font-weight: 700; border-bottom: 1px solid var(--glass-border); white-space: nowrap; cursor: pointer; user-select: none;
    }
    table.dfir thead th:hover { color: var(--text-secondary); }
    table.dfir thead th .sort-ind { opacity: .5; margin-left: 4px; font-size: 9px; }
    table.dfir tbody td { padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text-secondary); vertical-align: top; }
    table.dfir tbody tr { transition: background .15s; cursor: pointer; }
    table.dfir tbody tr:hover { background: rgba(0,212,255,0.04); }
    table.dfir tbody tr.flagged { background: rgba(239,68,68,0.05); }
    table.dfir tbody tr.flagged:hover { background: rgba(239,68,68,0.09); }
    table.dfir .mono { font-family: var(--font-mono); color: var(--text-primary); font-variant-numeric: tabular-nums; }
    table.dfir .muted { color: var(--text-muted); }
    .row-detail td { background: rgba(0,0,0,0.3); padding: 14px 18px; }
    .kv { display: grid; grid-template-columns: 130px 1fr; gap: 6px 14px; font-size: 12px; }
    .kv .k { color: var(--text-muted); font-weight: 600; }
    .kv .v { color: var(--text-primary); font-family: var(--font-mono); word-break: break-word; }
    .empty-state { padding: 40px 20px; text-align: center; color: var(--text-muted); }
    .empty-state svg { width: 34px; height: 34px; margin-bottom: 12px; opacity: .5; }
    .empty-state h4 { color: var(--text-secondary); font-size: 14px; margin-bottom: 5px; }
    .empty-state p { font-size: 12px; }

    /* ===== CORRELATION / ATTACK CHAIN ===== */
    .chain { display: flex; flex-direction: column; gap: 0; }
    .chain-node { display: flex; gap: 14px; position: relative; padding-bottom: 8px; }
    .chain-rail { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
    .chain-marker { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--glass-border); position: relative; z-index: 2; }
    .chain-marker svg { width: 19px; height: 19px; }
    .chain-line { width: 2px; flex: 1; min-height: 22px; background: linear-gradient(to bottom, var(--glass-border-light), var(--glass-border)); margin: 2px 0; }
    .chain-node:last-child .chain-line { display: none; }
    .chain-body { flex: 1; min-width: 0; padding-bottom: 14px; }
    .chain-card { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 13px 15px; transition: border-color .2s, background .2s; }
    .chain-card:hover { border-color: var(--glass-border-light); background: rgba(255,255,255,0.035); }
    .chain-phase { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; margin-bottom: 5px; }
    .chain-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .chain-meta { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-bottom: 8px; word-break: break-word; }
    .chain-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    .ai-content li::before { content: ''; position: absolute; left: 2px; top: 8px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent-cyan); }
    .ai-content code { background: rgba(0,212,255,0.08); color: var(--accent-cyan); padding: 1px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 11px; border: 1px solid rgba(0,212,255,0.15); }
    .ai-cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent-cyan); margin-left: 2px; vertical-align: text-bottom; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

  const SETTINGS = { endpoint:'http://localhost:11434', model:'llama3.1:8b', backend:'http://localhost:8000', models:[], connected:false };

  function epBase(){ return SETTINGS.endpoint.replace(/\/+$/,''); }

  function ollamaReachable(timeoutMs){
    var ctrl = new AbortController();
    var to = setTimeout(function(){ ctrl.abort(); }, timeoutMs||1500);
    return fetch(epBase()+'/api/tags', { signal: ctrl.signal })
      .then(function(res){ clearTimeout(to); if(!res.ok) return false; return res.json().then(function(j){ SETTINGS.models=(j.models||[]).map(function(m){return m.name;}); SETTINGS.connected=true; return true; }); })
      .catch(function(){ clearTimeout(to); SETTINGS.connected=false; return false; });
  }

  function ollamaChat(opts){
    return new Promise(function(resolve, reject){
      fetch(epBase()+'/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model: SETTINGS.model, messages: opts.messages, stream: true, options:{ temperature: 0.2 } })
      }).then(function(res){
        if(!res.ok || !res.body){ reject(new Error('HTTP '+res.status)); return; }
        var reader = res.body.getReader(); var dec = new TextDecoder(); var buf='';
        (function pump(){
          reader.read().then(function(r){
            if(r.done){ resolve(); return; }
            buf += dec.decode(r.value, {stream:true});
            var idx;
            while((idx = buf.indexOf('\n')) >= 0){
              var line = buf.slice(0, idx).trim(); buf = buf.slice(idx+1);
              if(!line) continue;
              try { var o = JSON.parse(line); if(o.message && o.message.content) opts.onToken(o.message.content); } catch(e){}
            }
            pump();
          }).catch(reject);
        })();
      }).catch(reject);
    });
  }

  /* ---------- markdown-ish → HTML (safe: escape first) ---------- */
  function inlineMd(s){
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    return s;
  }
  function mdToHtml(src){
    var lines = esc(src).split('\n'); var html=''; var inList=false;
    function closeList(){ if(inList){ html+='</ul>'; inList=false; } }
    lines.forEach(function(ln){
      var t = ln.trim();
      if(/^#{1,6}\s+/.test(t)){ closeList(); html += '<h4>'+inlineMd(t.replace(/^#{1,6}\s+/,''))+'</h4>'; return; }
      if(/^(-|\*|•)\s+/.test(t)){ if(!inList){ html+='<ul>'; inList=true; } html += '<li>'+inlineMd(t.replace(/^(-|\*|•)\s+/,''))+'</li>'; return; }
      if(t===''){ closeList(); return; }
      closeList(); html += '<p>'+inlineMd(t)+'</p>';
    });
    closeList(); return html;
  }
  function streamDemo(text, onToken){
    return new Promise(function(resolve){
      var parts = text.match(/\S+\s*|\n/g) || [text]; var i=0;
      var timer = setInterval(function(){ if(i>=parts.length){ clearInterval(timer); resolve(); return; } onToken(parts[i++]); }, 13);
    });
  }

    fi.addEventListener('change', function(){ handleFiles(fi.files); fi.value=''; });
    ['dragenter','dragover'].forEach(function(ev){ dz.addEventListener(ev, function(e){ e.preventDefault(); dz.classList.add('drag'); }); });
    ['dragleave','drop'].forEach(function(ev){ dz.addEventListener(ev, function(e){ e.preventDefault(); dz.classList.remove('drag'); }); });
    dz.addEventListener('drop', function(e){ handleFiles(e.dataTransfer.files); });
    function handleFiles(files){
      var n = files && files.length ? files.length : 0;
      close();
      if (!n){ toast('Nothing to import','No files were selected','warn'); return; }
      toast('Ingesting evidence', n+' artifact(s) — parsing locally','info');
      setTimeout(function(){ toast('Evidence ingested','Timeline & correlation refreshed','ok'); navigate('timeline'); }, 1100);
    }
  }

  function wireShortcuts(){
    document.addEventListener('keydown', function(e){
      if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
      if (e.key==='Escape'){ $('#importModal').classList.remove('open'); return; }
      var n = parseInt(e.key,10);
      if (!isNaN(n) && n>=1 && n<=NAV.length){ navigate(NAV[n-1].id); }
    });
  }

  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  </script>

</body>
</html>
